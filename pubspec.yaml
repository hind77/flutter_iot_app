name: flutter_iot_app
description: "A complete Flutter IoT mobile application for sensor data collection and alerts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.10

  # MQTT for real-time sensor data
  mqtt_client: ^10.0.0

  # Charts
  fl_chart: ^0.64.0

  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.3

  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

  # Styling & UI
  google_fonts: ^5.1.0
  intl: ^0.19.0 # For date/time formatting
  speech_to_text: ^6.6.0
  flex_color_scheme: ^7.3.1
  flex_seed_scheme: ^1.4.0
  path_provider: ^2.1.3
  csv: ^6.0.0
  google_maps_flutter: ^2.5.3
  url_launcher: ^6.2.4
  font_awesome_flutter: ^10.9.0
  geolocator: ^11.1.0
  http: ^1.1.0
  flutter_local_notifications: ^18.0.1
  provider: ^6.1.5+1
  flutter_colorpicker: ^1.1.0
  open_weather_client: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
