name: flutter_iot_app
description: "A complete Flutter IoT mobile application for sensor data collection and alerts."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.10

  # MQTT for real-time sensor data
  mqtt_client: ^10.0.0

  # Charts
  fl_chart: ^0.64.0

  # Local Storage
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2

  # Notifications
  firebase_core: ^2.24.2
  firebase_messaging: ^14.7.10

  # Styling & UI
  google_fonts: ^5.1.0
  intl: ^0.19.0 # For date/time formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
